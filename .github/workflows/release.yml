name: Build Release and Increment Version

on:
  workflow_dispatch:
    inputs:
      version_bump:
        description: 'Which version number to increment'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
        default: 'patch'

jobs:
  build-packages:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            package_type: deb
          - os: windows-latest
            platform: windows
            package_type: exe

    runs-on: ${{ matrix.os }}

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'

      - name: Get current version
        id: get_version
        shell: bash
        run: |
          CURRENT_VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout | grep -v '\[')
          echo "current_version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
          echo "Current version: $CURRENT_VERSION"

      - name: Set release version in AppInfo.java
        shell: bash
        run: |
          RELEASE_VERSION="${{ steps.get_version.outputs.current_version }}"
          TAG_VERSION=${RELEASE_VERSION%-SNAPSHOT}
          sed -i "s/VERSION = \"[^\"]*\"/VERSION = \"${TAG_VERSION}\"/" \
            src/main/java/com/cleanmediamanager/AppInfo.java

      - name: Build with Maven
        run: mvn clean package -DskipTests

      - name: Create native package (Linux)
        if: matrix.platform == 'linux'
        shell: bash
        run: |
          RELEASE_VERSION="${{ steps.get_version.outputs.current_version }}"
          TAG_VERSION=${RELEASE_VERSION%-SNAPSHOT}

          jpackage \
            --input target \
            --name CleanMediaManager \
            --main-jar clean-media-manager-${RELEASE_VERSION}-uber.jar \
            --main-class com.cleanmediamanager.Main \
            --type deb \
            --app-version ${TAG_VERSION} \
            --vendor "CleanMediaManager" \
            --description "A Java-based tool to automatically rename and organize media files" \
            --linux-shortcut \
            --linux-menu-group "Utilities" \
            --dest packages

      - name: Create native package (Windows)
        if: matrix.platform == 'windows'
        shell: bash
        run: |
          RELEASE_VERSION="${{ steps.get_version.outputs.current_version }}"
          TAG_VERSION=${RELEASE_VERSION%-SNAPSHOT}

          jpackage \
            --input target \
            --name CleanMediaManager \
            --main-jar clean-media-manager-${RELEASE_VERSION}-uber.jar \
            --main-class com.cleanmediamanager.Main \
            --type exe \
            --app-version ${TAG_VERSION} \
            --vendor "CleanMediaManager" \
            --description "A Java-based tool to automatically rename and organize media files" \
            --win-shortcut \
            --win-menu \
            --win-dir-chooser \
            --dest packages

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: package-${{ matrix.platform }}
          path: packages/*

  create-release:
    needs: build-packages
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'

      - name: Get current version
        id: get_version
        run: |
          CURRENT_VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout | grep -v '\[')
          echo "current_version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
          echo "Current version: $CURRENT_VERSION"

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: packages

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create Git Tag
        run: |
          RELEASE_VERSION="${{ steps.get_version.outputs.current_version }}"
          # Remove -SNAPSHOT suffix for release tag
          TAG_VERSION=${RELEASE_VERSION%-SNAPSHOT}
          git tag -a "v${TAG_VERSION}" -m "Release version ${TAG_VERSION}"
          git push origin "v${TAG_VERSION}"

      - name: Create GitHub Release
        run: |
          RELEASE_VERSION="${{ steps.get_version.outputs.current_version }}"
          TAG_VERSION=${RELEASE_VERSION%-SNAPSHOT}
          gh release create "v${TAG_VERSION}" \
            packages/package-linux/* \
            packages/package-windows/* \
            --title "Release v${TAG_VERSION}" \
            --generate-notes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Calculate new version
        id: new_version
        run: |
          CURRENT_VERSION="${{ steps.get_version.outputs.current_version }}"
          # Remove -SNAPSHOT suffix if present
          VERSION_BASE=${CURRENT_VERSION%-SNAPSHOT}

          # Split version into components
          IFS='.' read -ra VERSION_PARTS <<< "$VERSION_BASE"
          MAJOR=${VERSION_PARTS[0]:-0}
          MINOR=${VERSION_PARTS[1]:-0}
          PATCH=${VERSION_PARTS[2]:-0}

          # Increment based on input
          case "${{ inputs.version_bump }}" in
            major)
              MAJOR=$((MAJOR + 1))
              MINOR=0
              PATCH=0
              ;;
            minor)
              MINOR=$((MINOR + 1))
              PATCH=0
              ;;
            patch)
              PATCH=$((PATCH + 1))
              ;;
          esac

          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}-SNAPSHOT"
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "New version will be: $NEW_VERSION"

      - name: Update pom.xml version
        run: |
          mvn versions:set -DnewVersion=${{ steps.new_version.outputs.new_version }} -DgenerateBackupPoms=false

      - name: Set release version in AppInfo.java (committed)
        run: |
          RELEASE_VERSION="${{ steps.get_version.outputs.current_version }}"
          TAG_VERSION=${RELEASE_VERSION%-SNAPSHOT}
          sed -i "s/VERSION = \"[^\"]*\"/VERSION = \"${TAG_VERSION}\"/" \
            src/main/java/com/cleanmediamanager/AppInfo.java

      - name: Commit version bump
        run: |
          git add pom.xml src/main/java/com/cleanmediamanager/AppInfo.java
          git commit -m "Bump version to ${{ steps.new_version.outputs.new_version }} after ${{ inputs.version_bump }} release"
          git push

      - name: Create Release Summary
        run: |
          RELEASE_VERSION="${{ steps.get_version.outputs.current_version }}"
          TAG_VERSION=${RELEASE_VERSION%-SNAPSHOT}
          echo "## Release Build Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Released Version**: v${TAG_VERSION}" >> $GITHUB_STEP_SUMMARY
          echo "- **New Development Version**: ${{ steps.new_version.outputs.new_version }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Version Bump Type**: ${{ inputs.version_bump }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "The release has been created and is available at: https://github.com/${{ github.repository }}/releases/tag/v${TAG_VERSION}" >> $GITHUB_STEP_SUMMARY
